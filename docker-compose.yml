services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-meetbot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meet_bot}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-meetbot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_IMAGE: ${BUILD_IMAGE:-meet-bot-api:dev}
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      PORT: "3000"
      # Public origin used for Google OAuth redirect URI + cookie scoping. MUST exactly match the
      # "Authorized redirect URI" registered in Google Cloud Console.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:4000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:-}
      DATA_ENC_KEY: ${DATA_ENC_KEY:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-meetbot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meet_bot}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      APP_DEMO_MODE: ${APP_DEMO_MODE:-false}
    volumes:
      - recordings:/data
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./apps/worker
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_IMAGE: ${BUILD_IMAGE:-meet-bot-worker:dev}
    container_name: meet-bot-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      DISPLAY: ":99"
      # Worker needs GOOGLE_CLIENT_ID/SECRET to refresh user access tokens, and TOKEN_ENC_KEY to
      # decrypt refresh tokens stored in MySQL. Without these, Drive upload after recording fails.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:-}
      DATA_ENC_KEY: ${DATA_ENC_KEY:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-meetbot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-meet_bot}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      # Required for F11 / fullscreen UI and --start-fullscreen/--start-maximized.
      HEADLESS: "false"
      # npm ffmpeg-static lacks Pulse — force Ubuntu image ffmpeg for x11grab+pulse.
      MEET_FFMPEG_PATH: ${MEET_FFMPEG_PATH:-/usr/bin/ffmpeg}
      # x11grab+pulse → meet-desktop.mp4 with audio.
      MEET_LINUX_RECORD_MODE: x11
      # docker-worker.sh creates `meet_bot_sink` and pins this so .env drift can't route to a silent sink.
      MEET_PULSE_SOURCE: meet_bot_sink.monitor
      # Meet over WebSockets rarely reaches networkidle — load avoids hangs in Docker/cloud.
      MEET_GOTO_WAIT_UNTIL: load
      MEET_GOTO_TIMEOUT_MS: "180000"
      MEETING_MAX_SECONDS: "3600"
      JOIN_TIMEOUT_SECONDS: "300"
      BULLMQ_LOCK_DURATION_MS: "600000"
      BULLMQ_STALLED_INTERVAL_MS: "120000"
      BULLMQ_MAX_STALLED_COUNT: "10"
      DO_SPACES_KEY: ${DO_SPACES_KEY:-}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET:-}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-fra1}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://fra1.digitaloceanspaces.com}
      DO_SPACES_PUBLIC_URL: ${DO_SPACES_PUBLIC_URL:-}
      MEET_ARTIFACT_CHAT: ${MEET_ARTIFACT_CHAT:-true}
      MEET_ARTIFACT_SCREENSHOTS_SEC: ${MEET_ARTIFACT_SCREENSHOTS_SEC:-30}
      MEET_RECORDING_FULLSCREEN: ${MEET_RECORDING_FULLSCREEN:-true}
      MEET_RECORDING_KIOSK: ${MEET_RECORDING_KIOSK:-false}
      MEET_HIDE_MEET_CONTROLS_CSS: ${MEET_HIDE_MEET_CONTROLS_CSS:-true}
      MEET_RECORDING_CROP_BOTTOM_PX: ${MEET_RECORDING_CROP_BOTTOM_PX:-0}
      VIDEO_WIDTH: ${VIDEO_WIDTH:-1920}
      VIDEO_HEIGHT: ${VIDEO_HEIGHT:-1080}
      APP_DEMO_MODE: ${APP_DEMO_MODE:-false}
    volumes:
      - recordings:/data
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    shm_size: 2gb

  dashboard:
    build:
      context: ./apps/dashboard
      args:
        # Next.js rewrites `/api/*` server-side — use Docker DNS, not localhost.
        INTERNAL_API_BASE_URL: http://api:3000
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    environment:
      # Runtime (next start); same values so any dynamic config stays aligned.
      INTERNAL_API_BASE_URL: http://api:3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
      NEXT_PUBLIC_APP_DEMO_MODE: ${APP_DEMO_MODE:-false}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  recordings:
